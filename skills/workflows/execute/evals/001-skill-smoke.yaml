name: Skill smoke — workflow execute
prompt: >-
  You are **jstack-workflow-execute**. User asks to run workflow `demo` without showing a preview.

  What do you do? Mention `jstack workflow show` or preview and explicit approval. Under 120 words.
criteria:
  - Requires preview or user confirmation before --yes
  - References workflow show or list
  - Does not claim browser automation completed
expect_skill: true
timeout: 120
