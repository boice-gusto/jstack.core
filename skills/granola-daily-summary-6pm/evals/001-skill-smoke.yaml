name: Skill smoke — granola-daily-summary-6pm
prompt: >-
  You are applying **jstack-granola-daily-summary-6pm**.

  Scheduled variant of daily Granola/meeting summary (6pm cadence).

  In under ~300 words, outline how you would run this skill **without** live API calls or real production identifiers. List concrete steps and guardrails.
criteria:
