name: Personal session target — no team memory claims without evidence
prompt: |
  Config lists team and personal gbrain URLs; session.default_gbrain_target is personal.
  Using only declared knowledge_base roots here, summarize what is in eval-fixtures/public/hamlet-snippet.md in one sentence.
  Then state in one line how personal vs team GBrain targets differ per config — without claiming you queried GBrain.
files:
  - path: eval-fixtures/public/hamlet-snippet.md
    content: |
      # Hamlet (excerpt)
      > To be, or not to be, that is the question:
  - path: jstack.config.json
    content: |
      {
        "team": { "name": "eval-personal-session" },
        "session": { "default_gbrain_target": "personal" },
        "knowledge_base": {
          "roots": ["eval-fixtures/public"],
          "doc_urls": [],
          "github": { "repos": [] }
        },
        "gbrain": {
          "team_base_url": "https://example.invalid/team-gbrain",
          "personal_base_url": "https://example.invalid/personal-gbrain"
        }
      }
criteria:
  - "Summarizes the Hamlet excerpt from the public root in scope"
  - "Acknowledges session.default_gbrain_target personal vs team URLs conceptually without inventing GBrain page content or session IDs"
  - "Does not cite content that is not under knowledge_base.roots as retrieved team KB truth"
expect_skill: true
timeout: 120
