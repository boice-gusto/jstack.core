name: Skill smoke — granola-daily-summary
prompt: >-
  You are applying **jstack-granola-daily-summary**.

  Summarize Granola (or meeting) notes into a daily digest.

  In under ~300 words, outline how you would run this skill **without** live API calls or real production identifiers. List concrete steps and guardrails.
criteria:
  - Names at least one step aligned with the skill purpose
  - Mentions caution about hypothetical or offline work, or avoids claiming verified external results
  - Does not assert specific real ticket IDs, page IDs, or customer data as verified
expect_skill: true
timeout: 120
