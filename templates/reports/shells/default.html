<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>jstack report</title>
  <!--__JSTACK_HEAD_EXTRAS__-->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <style>
/*__JSTACK_BRANDING_CSS__*/
    body { font-family: var(--font-sans, system-ui, sans-serif); background: var(--color-background, #f8fafc); color: var(--color-text, #0f172a); }
    .card { background: var(--color-surface, #fff); border: 1px solid var(--color-border, #e2e8f0); border-radius: var(--radius-md, 0.5rem); }
    a.report-link { color: var(--color-link, #2563eb); }
    .report-md { font-size: 0.9375rem; line-height: 1.55; color: var(--color-text, #0f172a); }
    .report-md h1, .report-md h2, .report-md h3 { font-weight: 600; margin: 0.75rem 0 0.35rem; }
    .report-md p { margin: 0.35rem 0; }
    .report-md ul { list-style: disc; padding-left: 1.25rem; margin: 0.35rem 0; }
    .report-md ol { list-style: decimal; padding-left: 1.25rem; margin: 0.35rem 0; }
    .report-md li { margin: 0.2rem 0; }
    .report-md table { width: 100%; border-collapse: collapse; margin: 0.5rem 0; font-size: 0.875rem; }
    .report-md th, .report-md td { border: 1px solid var(--color-border, #e2e8f0); padding: 0.4rem 0.55rem; text-align: left; }
    .report-md th { background: var(--color-background, #f1f5f9); font-weight: 600; }
    .report-md code { font-size: 0.8125em; background: #f1f5f9; padding: 0.1em 0.35em; border-radius: 0.25rem; }
    .report-md pre { background: #f8fafc; border: 1px solid var(--color-border, #e2e8f0); padding: 0.75rem; border-radius: 0.375rem; overflow-x: auto; font-size: 0.8125rem; }
    .report-md pre code { background: none; padding: 0; }
    .report-md strong { font-weight: 600; }
    .report-md blockquote { margin: 0.5rem 0; padding-left: 0.75rem; border-left: 3px solid #cbd5e1; color: #475569; }
    #root[data-report-kind] { padding-left: 0.75rem; margin-left: -0.25rem; border-left: 4px solid var(--report-accent, #cbd5e1); }
    #root[data-report-kind="team-weekly"] { --report-accent: #0d9488; }
    #root[data-report-kind="engineer-weekly"] { --report-accent: #475569; }
    #root[data-report-kind="manager-rollup"] { --report-accent: #4f46e5; }
    #root[data-report-kind="project-status"] { --report-accent: #d97706; }
    #root[data-report-kind="sprint-summary"] { --report-accent: #7c3aed; }
    #root[data-report-kind="incident-retro"] { --report-accent: #dc2626; }
    #root[data-report-kind="eval-report"] { --report-accent: #be123c; }
    #root[data-report-kind="self-report"] { --report-accent: #059669; }
    #root[data-report-kind="generic"] { --report-accent: #64748b; }
    .report-kind-pill { display: inline-flex; align-items: center; border-radius: 9999px; padding: 0.28rem 0.75rem; font-size: 0.6875rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; border: 1px solid transparent; white-space: nowrap; }
    .report-kind-pill--team-weekly { background: rgba(13, 148, 136, 0.12); color: #0f766e; border-color: rgba(13, 148, 136, 0.35); }
    .report-kind-pill--engineer-weekly { background: rgba(71, 85, 105, 0.12); color: #334155; border-color: rgba(71, 85, 105, 0.35); }
    .report-kind-pill--manager-rollup { background: rgba(79, 70, 229, 0.1); color: #3730a3; border-color: rgba(79, 70, 229, 0.35); }
    .report-kind-pill--project-status { background: rgba(217, 119, 6, 0.12); color: #92400e; border-color: rgba(217, 119, 6, 0.4); }
    .report-kind-pill--sprint-summary { background: rgba(124, 58, 237, 0.1); color: #5b21b6; border-color: rgba(124, 58, 237, 0.35); }
    .report-kind-pill--incident-retro { background: rgba(220, 38, 38, 0.1); color: #991b1b; border-color: rgba(220, 38, 38, 0.35); }
    .report-kind-pill--eval-report { background: rgba(190, 24, 93, 0.1); color: #9f1239; border-color: rgba(190, 24, 93, 0.35); }
    .report-kind-pill--self-report { background: rgba(5, 150, 105, 0.1); color: #065f46; border-color: rgba(5, 150, 105, 0.35); }
    .report-kind-pill--generic { background: rgba(100, 116, 139, 0.12); color: #334155; border-color: rgba(100, 116, 139, 0.35); }
    .report-lead { font-size: 0.875rem; color: var(--color-text-muted, #64748b); margin-top: 0.35rem; max-width: 42rem; line-height: 1.45; }
  </style>
</head>
<body class="min-h-screen p-8">
  <div class="max-w-3xl mx-auto space-y-4">
    <!--__JSTACK_BRAND_HEADER__-->
    <div id="root" class="space-y-4"></div>
  </div>
  <script type="application/json" id="jstack-report-data"></script>
  <script>
    const el = document.getElementById('jstack-report-data');
    const raw = el ? el.textContent.trim() : '';
    const root = document.getElementById('root');

    function insertBanner(kind, message) {
      const p = document.createElement('p');
      p.className = kind === 'error'
        ? 'p-4 text-red-700 bg-red-50 border border-red-200 rounded max-w-3xl mx-auto mt-4'
        : 'p-4 text-amber-800 bg-amber-50 border border-amber-200 rounded max-w-3xl mx-auto mt-4';
      p.textContent = message;
      document.body.insertBefore(p, document.body.firstChild);
    }

    function appendMarkdownHtml(container, md) {
      if (typeof marked === 'undefined' || typeof DOMPurify === 'undefined') {
        container.textContent = md;
        return;
      }
      try {
        const htmlBody = marked.parse(md, { breaks: true, gfm: true });
        const clean = DOMPurify.sanitize(htmlBody);
        const range = document.createRange();
        container.appendChild(range.createContextualFragment(clean));
      } catch (e) {
        console.warn('Markdown render', e);
        container.textContent = md;
      }
    }

    if (!raw) {
      insertBanner('warn', 'No report payload: the jstack-report-data script is empty. Re-run jstack report render --data <file.json> (from repo root, prefer an org plugin such as jstack.gusto over jstack.core when both exist).');
      document.title = 'Report shell (no data)';
      if (root) {
        const shell = document.createElement('article');
        shell.className = 'card p-6 shadow-sm';
        const h1 = document.createElement('h1');
        h1.className = 'text-2xl font-semibold mb-3';
        h1.textContent = 'Report shell (no data)';
        shell.appendChild(h1);
        const p1 = document.createElement('p');
        p1.className = 'text-slate-600 mb-3';
        p1.textContent = 'This HTML is a template. The CLI injects JSON into the jstack-report-data script so charts and sections render.';
        shell.appendChild(p1);
        const pre = document.createElement('pre');
        pre.className = 'text-xs bg-slate-50 p-3 rounded border overflow-x-auto whitespace-pre-wrap';
        pre.textContent = 'jstack report render --data examples/reports/payloads/generic.json --out /tmp/report.html';
        shell.appendChild(pre);
        root.appendChild(shell);
      }
    } else {
    let data = { meta: { title: 'Report' }, sections: [] };
      try {
        data = JSON.parse(raw);
      } catch (err) {
        console.error('jstack-report-data parse', err);
        const msg = err && err.message ? err.message : String(err);
        insertBanner('error', 'Invalid report JSON: ' + msg);
      }
    const meta = data.meta || {};
    document.title = meta.title || 'Report';
    const kind = meta.report_kind ? String(meta.report_kind) : '';
    root.setAttribute('data-report-kind', kind);
    var KIND_LABEL = {
      'team-weekly': 'Team weekly',
      'engineer-weekly': 'Engineer weekly',
      'manager-rollup': 'Manager rollup',
      'project-status': 'Project status',
      'sprint-summary': 'Sprint summary',
      'incident-retro': 'Incident retro',
      'eval-report': 'Performance eval',
      'self-report': 'Self report',
      'generic': 'Generic report'
    };
    var KIND_LEAD = {
      'team-weekly': 'Squad health, risks, and throughput for your weekly engineering forum.',
      'engineer-weekly': 'IC snapshot: shipped work, in-flight items, blockers, and learnings.',
      'manager-rollup': 'Cross-team delivery, people signals, and exec asks in one page.',
      'project-status': 'Steering view: milestones, RAG, risks, and leadership decisions needed.',
      'sprint-summary': 'Sprint outcome: done vs carryover, velocity, and retro themes.',
      'incident-retro': 'Blameless narrative: timeline, root cause, what worked, and follow-ups.',
      'eval-report': 'Calibration packet: placement, evidence, growth plan, and manager narrative.',
      'self-report': 'Self-assessment: outcomes, collaboration, growth, and asks for your reviewer.',
      'generic': 'Flexible layout when a named report kind does not fit your story.'
    };
    var FOOTER_BY_KIND = {
      'team-weekly': 'Team weekly — share with the named team and its engineering leadership chain only.',
      'engineer-weekly': 'Engineer weekly — confidential to the named engineer and their direct manager.',
      'manager-rollup': 'Manager rollup — for engineering management; do not forward externally.',
      'project-status': 'Project status — distribution follows your program’s stakeholder list.',
      'sprint-summary': 'Sprint summary — internal agile artifact; not a customer-facing commitment.',
      'incident-retro': 'Incident retro — follow your org’s retention and privacy rules for postmortems.',
      'eval-report': 'Performance evaluation — HR confidentiality and calibration rules apply.',
      'self-report': 'Self report — owned by the author; share with reviewer chain unless policy says otherwise.',
      'generic': 'Generic report — classify and distribute per your org’s data-handling policy.'
    };
    var FOOTER_DEFAULT = 'This report is confidential unless your org marks it for wider distribution.';
    var headRow = document.createElement('div');
    headRow.className = 'flex flex-wrap items-start justify-between gap-3 mb-2';
    var titleStack = document.createElement('div');
    titleStack.className = 'min-w-0 flex-1';
    var h1 = document.createElement('h1');
    h1.className = 'text-2xl font-semibold tracking-tight';
    h1.textContent = meta.title || 'Report';
    titleStack.appendChild(h1);
    if (kind && KIND_LEAD[kind]) {
      var leadEl = document.createElement('p');
      leadEl.className = 'report-lead';
      leadEl.textContent = KIND_LEAD[kind];
      titleStack.appendChild(leadEl);
    }
    headRow.appendChild(titleStack);
    var pillKind = kind && KIND_LABEL[kind] ? kind.replace(/[^a-z0-9-]/g, '') : 'generic';
    if (!KIND_LABEL[kind]) pillKind = 'generic';
    var pill = document.createElement('span');
    pill.className = 'report-kind-pill report-kind-pill--' + pillKind;
    pill.setAttribute('role', 'doc-subtitle');
    pill.textContent = kind && KIND_LABEL[kind] ? KIND_LABEL[kind] : 'Report';
    headRow.appendChild(pill);
    root.appendChild(headRow);
    const subBits = [];
    if (meta.subtitle) subBits.push(meta.subtitle);
    if (meta.team) subBits.push('Team: ' + meta.team);
    if (meta.generated_at) subBits.push('Generated: ' + meta.generated_at);
    if (subBits.length) {
      const subEl = document.createElement('p');
      subEl.className = 'text-sm text-slate-600 mb-6';
      subEl.textContent = subBits.join(' · ');
      root.appendChild(subEl);
    } else {
      headRow.className = headRow.className + ' mb-6';
    }
    function chartTickColor() {
      if (typeof getComputedStyle === 'undefined' || !document.documentElement) return '#64748b';
      return getComputedStyle(document.documentElement).getPropertyValue('--color-text-muted').trim() || '#64748b';
    }
    function gridLineColor(tickHex) {
      if (!tickHex || tickHex[0] !== '#' || tickHex.length < 7) return 'rgba(100, 116, 139, 0.2)';
      const r = parseInt(tickHex.slice(1, 3), 16);
      const g = parseInt(tickHex.slice(3, 5), 16);
      const b = parseInt(tickHex.slice(5, 7), 16);
      return 'rgba(' + r + ',' + g + ',' + b + ',0.2)';
    }
    function buildChartConfig(ch) {
      const stacked = ch.options && ch.options.stacked;
      const beginAtZero = !ch.options || ch.options.y_axis_begin_at_zero !== false;
      const base = { responsive: true, maintainAspectRatio: true, aspectRatio: ch.type === 'doughnut' ? 1.4 : 1.8 };
      if (ch.type === 'doughnut') {
        return {
          type: 'doughnut',
          data: { labels: ch.labels, datasets: ch.datasets },
          options: { plugins: { title: ch.title ? { display: true, text: ch.title } : { display: false } } }
        };
      }
      const tick = chartTickColor();
      const grid = gridLineColor(tick);
      return {
        type: ch.type,
        data: { labels: ch.labels, datasets: ch.datasets },
        options: Object.assign(base, {
          plugins: { title: ch.title ? { display: true, text: ch.title } : { display: false } },
          scales: {
            x: { stacked: !!stacked, ticks: { color: tick }, grid: { color: grid } },
            y: { stacked: !!stacked, beginAtZero: beginAtZero, ticks: { color: tick }, grid: { color: grid } }
          }
        })
      };
    }
    (data.sections || []).forEach(function (s) {
      const c = document.createElement('section');
      c.className = 'card p-4 shadow-sm';
      const t = document.createElement('h2');
      t.className = 'text-lg font-medium mb-2';
      t.textContent = s.title || s.id || 'Section';
      c.appendChild(t);
      if (s.chart && window.Chart) {
        const wrap = document.createElement('div');
        wrap.className = s.chart.type === 'doughnut' ? 'max-w-md mx-auto my-2' : 'w-full h-64 my-2';
        const canvas = document.createElement('canvas');
        wrap.appendChild(canvas);
        c.appendChild(wrap);
        try {
          new Chart(canvas.getContext('2d'), buildChartConfig(s.chart));
        } catch (e) { console.warn('Chart render', e); }
      }
      if (s.body_markdown) {
        const p = document.createElement('div');
        p.className = 'report-md mt-2';
        appendMarkdownHtml(p, s.body_markdown);
        c.appendChild(p);
      }
      root.appendChild(c);
    });
    if (data.links && data.links.length) {
      const nav = document.createElement('div');
      nav.className = 'card p-4 mt-6';
      const h2 = document.createElement('h2');
      h2.className = 'text-lg font-medium mb-2';
      h2.textContent = 'Links';
      nav.appendChild(h2);
      const ul = document.createElement('ul');
      ul.className = 'list-disc pl-5';
      data.links.forEach(function (l) {
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.className = 'report-link underline';
        a.href = l.url || '#';
        a.textContent = l.label || l.url || 'link';
        li.appendChild(a);
        ul.appendChild(li);
      });
      nav.appendChild(ul);
      root.appendChild(nav);
    }
    var foot = document.createElement('footer');
    foot.className = 'max-w-3xl mx-auto mt-10 pt-6 border-t border-slate-200 text-sm text-slate-500 text-center';
    var footText = (typeof meta.footer_note === 'string' && meta.footer_note.trim())
      ? meta.footer_note.trim()
      : (FOOTER_BY_KIND[kind] || FOOTER_DEFAULT);
    foot.textContent = footText;
    root.after(foot);
    }
  </script>
</body>
</html>
