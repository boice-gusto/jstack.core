<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>jstack report</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20128%20128%22%20role%3D%22img%22%20aria-label%3D%22jstack%22%3E%3Cpath%20fill%3D%22%233d5a73%22%20d%3D%22M16%2090%2042%2076%2048%2080%2022%2094z%22%2F%3E%3Cpath%20fill%3D%22%234d6f86%22%20d%3D%22M22%2076%2048%2062%2048%2074%2022%2088z%22%2F%3E%3Cpath%20fill%3D%22%236a8fa8%22%20d%3D%22M22%2062%2048%2048%2048%2060%2022%2074z%22%2F%3E%3Cpath%20fill%3D%22%237ba3d4%22%20fill-rule%3D%22evenodd%22%20d%3D%22M54%2024h46v12H66v38c0%2016%2012%2026%2030%2026h4v12H94c-26%200-42-16-42-42V24z%22%2F%3E%3C%2Fsvg%3E" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>
  <style>
:root {
  --color-main: #0f172a;
  --color-primary: #2563eb;
  --color-secondary: #64748b;
  --color-background: #f8fafc;
  --color-surface: #ffffff;
  --color-text: #0f172a;
  --color-text-muted: #64748b;
  --color-border: #e2e8f0;
  --color-button-primary-bg: #2563eb;
  --color-button-primary-text: #ffffff;
  --color-button-secondary-bg: #e2e8f0;
  --color-button-secondary-text: #0f172a;
  --color-link: #2563eb;
  --radius-md: 0.5rem;
  --font-sans: system-ui, sans-serif;
}
    body { font-family: var(--font-sans, system-ui, sans-serif); background: var(--color-background, #f8fafc); color: var(--color-text, #0f172a); }
    .card { background: var(--color-surface, #fff); border: 1px solid var(--color-border, #e2e8f0); border-radius: var(--radius-md, 0.5rem); }
    a.report-link { color: var(--color-link, #2563eb); }
  </style>
</head>
<body class="min-h-screen p-8">
  <div class="max-w-3xl mx-auto space-y-4">
    <div class="flex items-center gap-2 mb-2 text-slate-600"><span aria-hidden="true"><svg class="w-10 h-10 shrink-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="jstack"><path fill="#3d5a73" d="M16 90 42 76 48 80 22 94z"/><path fill="#4d6f86" d="M22 76 48 62 48 74 22 88z"/><path fill="#6a8fa8" d="M22 62 48 48 48 60 22 74z"/><path fill="#7ba3d4" fill-rule="evenodd" d="M54 24h46v12H66v38c0 16 12 26 30 26h4v12H94c-26 0-42-16-42-42V24z"/></svg></span><span class="font-semibold text-sm">jstack</span></div>
    <div id="root" class="space-y-4"></div>
  </div>
  <script type="application/json" id="jstack-report-data">{
  "schema_version": 1,
  "meta": {
    "title": "Quarterly planning — engineering priorities",
    "generated_at": "2026-04-28T12:00:00Z",
    "team": "Engineering",
    "report_kind": "generic",
    "subtitle": "Draft for leadership review · not approval-gated"
  },
  "sections": [
    {
      "id": "summary",
      "title": "Summary",
      "body_markdown": "This **generic** layout uses the same **ReportPayload** shell as named report kinds: sections carry **markdown** bodies and optional **charts**. Use it when your narrative does not map cleanly to **team-weekly**, **sprint-summary**, etc.\n\n**Focus next quarter:** reliability investments (**SLO** burn reduction), **developer velocity** (CI + templates), and **security** baseline (**SSDF** checklist)."
    },
    {
      "id": "priorities",
      "title": "Priority themes",
      "body_markdown": "| Theme | Why now | Success signal |\n|-------|---------|----------------|\n| Reliability | Burn alerts trending up | Error budget green **4** weeks straight |\n| Velocity | Onboarding time high | **TTHW** median **−30%** |\n| Security | Audit findings aging | **0** critical older than **90d** |"
    },
    {
      "id": "investment_mix",
      "title": "Illustrative allocation",
      "body_markdown": "Example **doughnut** chart for stakeholder scans — swap for **bar** or **line** when trends matter more than mix.",
      "chart": {
        "type": "doughnut",
        "title": "Planned engineering capacity (example)",
        "labels": ["Roadmap", "Tech debt", "Incidents / support", "Learning / spikes"],
        "datasets": [
          {
            "label": "Share",
            "data": [55, 20, 15, 10],
            "backgroundColor": [
              "rgba(14, 165, 233, 0.65)",
              "rgba(234, 179, 8, 0.65)",
              "rgba(239, 68, 68, 0.55)",
              "rgba(147, 51, 234, 0.55)"
            ]
          }
        ]
      }
    }
  ],
  "links": [
    { "label": "Source spreadsheet", "url": "https://docs.example.com/q2-planning" }
  ]
}</script>
  <script>
    const el = document.getElementById('jstack-report-data');
    let data = { meta: { title: 'Report' }, sections: [] };
    const raw = el ? el.textContent.trim() : '';
    if (raw) {
      try {
        data = JSON.parse(raw);
      } catch (err) {
        console.error('jstack-report-data parse', err);
        const msg = err && err.message ? err.message : String(err);
        document.body.insertAdjacentHTML('afterbegin', '<p class="p-4 text-red-700 bg-red-50 border border-red-200 rounded max-w-3xl mx-auto mt-4">Invalid report JSON: ' + msg + '</p>');
      }
    } else {
      document.body.insertAdjacentHTML('afterbegin', '<p class="p-4 text-amber-800 bg-amber-50 border border-amber-200 rounded max-w-3xl mx-auto mt-4">No report payload: the <code>jstack-report-data</code> script is empty. Re-run <code>jstack report render --data &lt;file.json&gt;</code> (from repo root, an org plugin such as <code>jstack.gusto</code> is preferred over <code>jstack.core</code> when both exist).</p>');
    }
    document.title = (data.meta && data.meta.title) || 'Report';
    const root = document.getElementById('root');
    const h1 = document.createElement('h1');
    h1.className = 'text-2xl font-semibold mb-6';
    h1.textContent = (data.meta && data.meta.title) || 'Report';
    root.appendChild(h1);
    function chartTickColor() {
      if (typeof getComputedStyle === 'undefined' || !document.documentElement) return '#64748b';
      return getComputedStyle(document.documentElement).getPropertyValue('--color-text-muted').trim() || '#64748b';
    }
    function gridLineColor(tickHex) {
      if (!tickHex || tickHex[0] !== '#' || tickHex.length < 7) return 'rgba(100, 116, 139, 0.2)';
      const r = parseInt(tickHex.slice(1, 3), 16);
      const g = parseInt(tickHex.slice(3, 5), 16);
      const b = parseInt(tickHex.slice(5, 7), 16);
      return 'rgba(' + r + ',' + g + ',' + b + ',0.2)';
    }
    function buildChartConfig(ch) {
      const stacked = ch.options && ch.options.stacked;
      const beginAtZero = !ch.options || ch.options.y_axis_begin_at_zero !== false;
      const base = { responsive: true, maintainAspectRatio: true, aspectRatio: ch.type === 'doughnut' ? 1.4 : 1.8 };
      if (ch.type === 'doughnut') {
        return {
          type: 'doughnut',
          data: { labels: ch.labels, datasets: ch.datasets },
          options: { plugins: { title: ch.title ? { display: true, text: ch.title } : { display: false } } }
        };
      }
      const tick = chartTickColor();
      const grid = gridLineColor(tick);
      return {
        type: ch.type,
        data: { labels: ch.labels, datasets: ch.datasets },
        options: Object.assign(base, {
          plugins: { title: ch.title ? { display: true, text: ch.title } : { display: false } },
          scales: {
            x: { stacked: !!stacked, ticks: { color: tick }, grid: { color: grid } },
            y: { stacked: !!stacked, beginAtZero: beginAtZero, ticks: { color: tick }, grid: { color: grid } }
          }
        })
      };
    }
    (data.sections || []).forEach(function (s) {
      const c = document.createElement('section');
      c.className = 'card p-4 shadow-sm';
      const t = document.createElement('h2');
      t.className = 'text-lg font-medium mb-2';
      t.textContent = s.title || s.id || 'Section';
      c.appendChild(t);
      if (s.chart && window.Chart) {
        const wrap = document.createElement('div');
        wrap.className = s.chart.type === 'doughnut' ? 'max-w-md mx-auto my-2' : 'w-full h-64 my-2';
        const canvas = document.createElement('canvas');
        wrap.appendChild(canvas);
        c.appendChild(wrap);
        try {
          new Chart(canvas.getContext('2d'), buildChartConfig(s.chart));
        } catch (e) { console.warn('Chart render', e); }
      }
      if (s.body_markdown) {
        const p = document.createElement('div');
        p.className = 'prose prose-sm max-w-none whitespace-pre-wrap mt-2';
        p.textContent = s.body_markdown;
        c.appendChild(p);
      }
      root.appendChild(c);
    });
    if (data.links && data.links.length) {
      const nav = document.createElement('div');
      nav.className = 'card p-4 mt-6';
      const h2 = document.createElement('h2');
      h2.className = 'text-lg font-medium mb-2';
      h2.textContent = 'Links';
      nav.appendChild(h2);
      const ul = document.createElement('ul');
      ul.className = 'list-disc pl-5';
      data.links.forEach(function (l) {
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.className = 'report-link underline';
        a.href = l.url || '#';
        a.textContent = l.label || l.url || 'link';
        li.appendChild(a);
        ul.appendChild(li);
      });
      nav.appendChild(ul);
      root.appendChild(nav);
    }
    var foot = document.createElement('footer');
    foot.className = 'max-w-3xl mx-auto mt-10 pt-6 border-t border-slate-200 text-sm text-slate-500 text-center';
    foot.textContent = 'This report is confidential and for the named engineer only';
    root.after(foot);
  </script>
</body>
</html>
